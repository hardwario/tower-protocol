name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test & lint (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # The crate is a no_std library; tests (and the `verify` Ed25519 path) run on the host.
      - name: Clippy (incl. verify + tests)
        run: cargo clippy --all-targets --features verify -- -D warnings

      - name: Test
        run: cargo test --features verify

  embedded:
    name: Build (thumbv6m, no_std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (+ Cortex-M0+ target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi

      - uses: Swatinem/rust-cache@v2

      # Guarantee the crate stays no_std / embedded-buildable (the firmware links it on the MCU),
      # with and without the salty-backed verify feature.
      - name: Build (default)
        run: cargo build --target thumbv6m-none-eabi
      - name: Build (verify)
        run: cargo build --target thumbv6m-none-eabi --features verify

  # Single-source the version from Cargo.toml: when a push to main carries a version the repo
  # isn't tagged for yet, create the matching `vX.Y.Z` tag + a GitHub Release. Idempotent (skips
  # if the tag already exists), and only after CI is green — so a forgotten `git tag` can never
  # leave consumers (tower-firmware, tower-cli) pinning a version that has no tag to fetch.
  release:
    name: Tag + release on version bump
    needs: [test, embedded]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create tag + release if Cargo.toml version is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(sed -n 's/^version *= *"\(.*\)".*/\1/p' Cargo.toml | head -1)"
          if [ -z "$version" ]; then echo "::error::could not read version from Cargo.toml"; exit 1; fi
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already on origin — nothing to release."
            exit 0
          fi
          echo "Releasing ${tag}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "tower-protocol ${version}"
          git push origin "${tag}"
          gh release create "${tag}" --title "${tag}" --generate-notes
